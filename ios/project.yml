name: MNetMapper
options:
  bundleIdPrefix: com.mnet
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5"
    DEVELOPMENT_TEAM: ""
targets:
  MNetMapper:
    type: application
    platform: iOS
    sources:
      - MNetMapper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mnet.mapper
        INFOPLIST_FILE: MNetMapper/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: MNetMapper/Info.plist
